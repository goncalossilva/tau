name: Publish npm packages

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Verify package versions match tag
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const tag = process.env.GITHUB_REF_NAME;
          const packages = [
            'package.json',
            'packages/tau-coding-agent/package.json',
            'packages/tau-all-agent/package.json',
          ];
          for (const file of packages) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (pkg.version !== tag) {
              console.error(`${file} version ${pkg.version} does not match tag ${tag}`);
              process.exit(1);
            }
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Publish packages
        run: |
          set -euo pipefail
          for dir in dist/tau-coding-agent dist/tau-all-agent; do
            echo "==> Publishing ${dir}"
            npm publish "${dir}" --provenance --access public
          done
